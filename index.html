<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>burbujita</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 1. PANTALLA DE BLOQUEO */
        #screen-lock {
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .code-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #ff4d6d;
            color: white;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 8px;
            width: 180px;
            padding: 5px;
            outline: none;
        }

        /* 2. CONTENIDO PRINCIPAL */
        #main-content {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            transition: opacity 0.8s ease;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        p {
            color: #b0b0b0;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        /* 3. CAJA SORPRESA INTERACTIVA (REEMPLAZA AL RASPADITO) */
        .box-container {
            width: 100%;
            height: 260px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #surprise-box {
            width: 140px;
            height: 140px;
            background-color: #ff4d6d;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s ease, opacity 0.5s ease;
            animation: pulse 1.5s infinite;
        }
        #surprise-box:active {
            transform: scale(0.9);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* IMAGEN OCULTA */
        .dibujo-fijo {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 12px;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        /* 4. SECCIÓN PREGUNTA Y BOTONES */
        #proposal-section {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            margin-top: 25px;
        }
        #proposal-section h2 {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.4;
        }
        .buttons-wrapper {
            margin-top: 25px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px; /* Contenedor controlado */
        }
        .btn {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        #btn-si {
            background-color: #ff4d6d;
            color: white;
            z-index: 10;
        }
        #btn-no {
            background-color: #444;
            color: #aaa;
            z-index: 5;
            /* Usamos transformaciones CSS en lugar de top/left para evitar saltos locos en móviles */
            transition: transform 0.15s ease-out; 
        }
    </style>
</head>
<body>

    <div id="screen-lock">
        <input type="password" id="code" class="code-input" placeholder="0000" maxlength="4" autocomplete="off">
    </div>

    <div id="main-content">
        <div class="container">
            <h1>Hola, tengo una sorpresa para ti</h1>
            <p id="instruction-text">Toca el regalo para abrirlo</p>
            
            <div class="box-container">
                <div id="surprise-box">¡Tócame!</div>
                <img class="dibujo-fijo" id="dibujo" src="midibujo.png" alt="Dibujo sorpresa">
            </div>

            <div id="proposal-section">
                <h2>Eres una persona muy importante para mi, me gustaria llevar esto al siguiente paso ¿Qué dices?</h2>
                <div class="buttons-wrapper">
                    <button id="btn-si" class="btn" onclick="aceptar()">SIII acepto</button>
                    <button id="btn-no" class="btn">no</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CÓDIGO DE ACCESO ---
        const codeInput = document.getElementById('code');
        const screenLock = document.getElementById('screen-lock');
        const mainContent = document.getElementById('main-content');

        codeInput.addEventListener('input', () => {
            if (codeInput.value === '0305') {
                screenLock.style.opacity = '0';
                setTimeout(() => {
                    screenLock.style.display = 'none';
                    mainContent.style.display = 'block';
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                    }, 50);
                }, 500);
            }
        });

        // --- 2. REVELAR REGALO ---
        const surpriseBox = document.getElementById('surprise-box');
        const dibujo = document.getElementById('dibujo');
        const instructionText = document.getElementById('instruction-text');
        const proposalSection = document.getElementById('proposal-section');

        // Funciona perfectamente con clic o toque sin importar el dispositivo
        function abrirRegalo() {
            surpriseBox.style.display = 'none';
            instructionText.innerText = "¡Sorpresa!";
            
            dibujo.style.display = 'block';
            setTimeout(() => {
                dibujo.style.opacity = '1';
                
                // Mostrar propuesta
                proposalSection.style.visibility = 'visible';
                proposalSection.style.opacity = '1';
                initBotonNo();
            }, 50);
        }

        surpriseBox.addEventListener('click', abrirRegalo);
        surpriseBox.addEventListener('touchstart', (e) => {
            e.preventDefault();
            abrirRegalo();
        });

        // --- 3. JUEGO DEL BOTÓN NO (BLINDADO CON CSS TRANSFORMS) ---
        let intentosNo = 0;
        let scaleSi = 1;
        let bloqueado = false;

        const textosSi = [
            "SIII acepto, te amo",
            "SIII, acepto, te amo, casate conmigo",
            "SIII, acepto, te amo, casate conmigo, hazme 3 hijos",
            "SIII, acepto, te amo, casate conmigo, hazme 3 hijos, te adoro eternamente"
        ];

        function initBotonNo() {
            const btnNo = document.getElementById('btn-no');

            // Manejador único tanto para mouse sobre PC como para toques en móvil
            const huyeBoton = (e) => {
                if (e) e.preventDefault();
                if (bloqueado) return;
                bloqueado = true;

                intentosNo++;
                const btnSi = document.getElementById('btn-si');

                if (intentosNo >= 5) {
                    btnSi.innerText = textosSi[3];
                    btnNo.style.display = 'none';
                    btnSi.style.transform = `scale(1.4)`;
                    return;
                }

                if (intentosNo <= textosSi.length) {
                    btnSi.innerText = textosSi[intentosNo - 1];
                }

                // En lugar de moverlo por píxeles absolutos que rompen la pantalla en móviles,
                // lo desplazamos usando CSS Translate dentro de rangos seguros.
                const x Aleatorio = (Math.random() * 160) - 80; // Se mueve entre -80px y 80px a los lados
                const y Aleatorio = (Math.random() * 60) - 30;  // Se mueve entre -30px y 30px arriba/abajo

                btnNo.style.transform = `translate(${xAleatorio}px, ${yAleatorio}px)`;

                // Crece el botón SÍ de forma sutil
                scaleSi += 0.12;
                btnSi.style.transform = `scale(${scaleSi})`;

                // Pequeño tiempo de espera para que los eventos táctiles duplicados no sumen de golpe
                setTimeout(() => { bloqueado = false; }, 250);
            };

            btnNo.addEventListener('mouseover', huyeBoton);
            btnNo.addEventListener('touchstart', huyeBoton, { passive: false });
            btnNo.addEventListener('click', huyeBoton);
        }

        function aceptar() {
            alert("yeiiii, muak");
        }
    </script>
</body>
</html>
