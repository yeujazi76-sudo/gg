<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un rincón especial ✨</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 1. PANTALLA DE BLOQUEO */
        #screen-lock {
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .code-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #ff4d6d;
            color: white;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 8px;
            width: 180px;
            padding: 5px;
            outline: none;
        }
        .code-input::placeholder {
            color: #444;
        }

        /* 2. CONTENIDO PRINCIPAL (OCULTO AL INICIO) */
        #main-content {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 0.8s ease;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.6;
            color: #b0b0b0;
            font-size: 1.1rem;
        }

        /* 3. ZONA DE RASPADITO */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 350px;
            margin: 30px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid #ffccd5;
        }
        .dibujo-fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: pointer;
        }

        /* 4. SECCIÓN PREGUNTA Y BOTONES */
        #proposal-section {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            margin-top: 20px;
        }
        .buttons-wrapper {
            margin-top: 30px;
            position: relative;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #btn-si {
            background-color: #ff4d6d;
            color: white;
            z-index: 10;
        }
        #btn-no {
            background-color: #444;
            color: #aaa;
            position: relative;
            z-index: 5;
            transition: all 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="screen-lock">
        <input type="password" id="code" class="code-input" placeholder="0000" maxlength="4" autocomplete="off">
    </div>

    <div id="main-content">
        <div class="container">
            <h1>Hola... ✨</h1>
            <p>Quería decirte algo importante de una manera un poco diferente. Raspa el cuadro de abajo para descubrirlo por completo:</p>
            
            <div class="canvas-container">
                <img class="dibujo-fondo" src="midibujo.png" alt="Dibujo sorpresa">
                <canvas id="scratch-canvas" width="350" height="350"></canvas>
            </div>

            <div id="proposal-section">
                <h2>¿Quieres ser mi novia? 🌹</h2>
                <div class="buttons-wrapper">
                    <button id="btn-si" class="btn" onclick="aceptar()">¡SÍ! 💖</button>
                    <button id="btn-no" class="btn" onmouseover="moverBotonNo()" onclick="moverBotonNo()">No</button>
                </div>
            </div>
        </div>
    </div>
