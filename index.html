<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>burbujita</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 1. PANTALLA DE BLOQUEO */
        #screen-lock {
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .code-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #ff4d6d;
            color: white;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 8px;
            width: 180px;
            padding: 5px;
            outline: none;
        }
        .code-input::placeholder {
            color: #444;
        }

        /* 2. CONTENIDO PRINCIPAL */
        #main-content {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 0.8s ease;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.6;
            color: #b0b0b0;
            font-size: 1.1rem;
        }

        /* 3. ZONA DE RASPADITO */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            height: 400px;
            margin: 30px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid #ffccd5;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .dibujo-fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #1a1a1a;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: pointer;
            touch-action: none;
        }

        /* 4. SECCIÓN PREGUNTA Y BOTONES */
        #proposal-section {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            margin-top: 20px;
        }
        #proposal-section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
            padding: 0 10px;
        }
        .buttons-wrapper {
            margin-top: 30px;
            position: relative;
            height: 180px; /* Un poco más de espacio para el juego de esquivar */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #btn-si {
            background-color: #ff4d6d;
            color: white;
            z-index: 10;
            white-space: normal;
            max-width: 280px;
            display: inline-block;
        }
        #btn-no {
            background-color: #444;
            color: #aaa;
            position: relative;
            z-index: 5;
            transition: top 0.12s ease, left 0.12s ease;
        }
    </style>
</head>
<body>

    <div id="screen-lock">
        <input type="password" id="code" class="code-input" placeholder="0000" maxlength="4" autocomplete="off">
    </div>

    <div id="main-content">
        <div class="container">
            <h1>Hola, tengo una sorpresa para ti</h1>
            <p>Me costó un poco hacerlo, espero que te guste</p>
            
            <div class="canvas-container">
                <img class="dibujo-fondo" id="dibujo" src="midibujo.png" alt="Dibujo sorpresa">
                <canvas id="scratch-canvas" width="300" height="400"></canvas>
            </div>

            <div id="proposal-section">
                <h2>Eres una persona muy importante para mi, me gustaria llevar esto al siguiente paso ¿Qué dices?</h2>
                <div class="buttons-wrapper">
                    <button id="btn-si" class="btn" onclick="aceptar()">SIII acepto</button>
                    <button id="btn-no" class="btn">no</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CÓDIGO DE ACCESO ---
        const codeInput = document.getElementById('code');
        const screenLock = document.getElementById('screen-lock');
        const mainContent = document.getElementById('main-content');

        codeInput.addEventListener('input', () => {
            if (codeInput.value === '0305') {
                screenLock.style.opacity = '0';
                setTimeout(() => {
                    screenLock.style.display = 'none';
                    mainContent.style.display = 'block';
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                        initScratch();
                    }, 50);
                }, 500);
            }
        });

        // --- 2. RASPADITO ---
        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('raspameee', canvas.width / 2, canvas.height / 2);

            function obtenerCoordenadas(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX = e.clientX;
                let clientY = e.clientY;

                if (e.targetTouches && e.targetTouches.length > 0) {
                    clientX = e.targetTouches[0].clientX;
                    clientY = e.targetTouches[0].clientY;
                } else if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }

                const x = (clientX - rect.left) * (canvas.width / rect.width);
                const y = (clientY - rect.top) * (canvas.height / rect.height);
                return { x, y };
            }

            function scratch(e) {
                if (!isDrawing) return;
                if (e.cancelable) e.preventDefault();

                const pos = obtenerCoordenadas(e);

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 40); 
                ctx.fill();

                checkScratchPercentage();
            }

            canvas.addEventListener('pointerdown', (e) => { isDrawing = true; canvas.setPointerCapture(e.pointerId); scratch(e); });
            canvas.addEventListener('pointermove', scratch);
            canvas.addEventListener('pointerup', (e) => { isDrawing = false; canvas.releasePointerCapture(e.pointerId); });
            canvas.addEventListener('pointercancel', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { scratch(e); }, { passive: false });
            window.addEventListener('touchend', () => isDrawing = false);

            function checkScratchPercentage() {
                try {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const pixels = imageData.data;
                    let clearedPixels = 0;

                    for (let i = 3; i < pixels.length; i += 4) {
                        if (pixels[i] === 0) clearedPixels++;
                    }

                    const percentage = (clearedPixels / (canvas.width * canvas.height)) * 100;

                    if (percentage > 18) { 
                        revelarPropuesta();
                    }
                } catch(e) {
                    revelarPropuesta();
                }
            }

            function revelarPropuesta() {
                canvas.style.transition = 'opacity 0.6s ease';
                canvas.style.opacity = '0';
                setTimeout(() => canvas.style.display = 'none', 600);
                
                const proposal = document.getElementById('proposal-section');
                proposal.style.display = 'block';
                setTimeout(() => {
                    proposal.style.opacity = '1';
                    initBotonNo(); 
                }, 50);
            }
        }

        // --- 3. BOTÓN "NO" CON MOVIMIENTO Y ESCALA CONTROLADA ---
        let intentosNo = 0;
        let scaleSi = 1;
        let haCambiadoAPosicionAbsoluta = false;
        let estaProcesando = false; // Bandera estricta para evitar doble conteo en móviles

        const textosSi = [
            "SIII acepto, te amo",
            "SIII, acepto, te amo, casate conmigo",
            "SIII, acepto, te amo, casate conmigo, hazme 3 hijos",
            "SIII, acepto, te amo, casate conmigo, hazme 3 hijos, te adoro eternamente"
        ];

        function initBotonNo() {
            const btnNo = document.getElementById('btn-no');

            // En móviles usamos touchstart pero con un candado de tiempo impecable
            btnNo.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Mata clicks fantasmas
                if (estaProcesando) return;
                estaProcesando = true;

                moverBotonNo();

                // Espera un momento antes de permitir el siguiente toque
                setTimeout(() => { estaProcesando = false; }, 300);
            }, { passive: false });

            // Para computadoras usamos mouseover tradicional
            btnNo.addEventListener('mouseover', () => {
                if (estaProcesando) return;
                estaProcesando = true;

                moverBotonNo();

                setTimeout(() => { estaProcesando = false; }, 100);
            });
        }

        function moverBotonNo() {
            const btnNo = document.getElementById('btn-no');
            const btnSi = document.getElementById('btn-si');
            const wrapper = document.querySelector('.buttons-wrapper');

            intentosNo++;

            if (intentosNo >= 5) {
                btnSi.innerText = textosSi[3];
                btnNo.style.display = 'none';
                scaleSi = 1.6; // Tamaño máximo fijo y limpio para que no rompa la interfaz
                btnSi.style.transform = `scale(${scaleSi})`;
                return;
            }

            if (intentosNo <= textosSi.length) {
                btnSi.innerText = textosSi[intentosNo - 1];
            }

            if (!haCambiadoAPosicionAbsoluta) {
                btnNo.style.position = 'absolute';
                haCambiadoAPosicionAbsoluta = true;
            }

            const maxX = wrapper.clientWidth - btnNo.clientWidth;
            const maxY = wrapper.clientHeight - btnNo.clientHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * (maxY - (-20))) + (-20); 

            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';

            // Crece un poco menos en cada paso (+0.15) para controlar el tamaño final
            scaleSi += 0.15;
            btnSi.style.transform = `scale(${scaleSi})`;
        }

        function aceptar() {
            alert("yeiiii, muak");
        }
    </script>
</body>
</html>
